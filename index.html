<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIN Quant | iOS Pro Terminal</title>
    <script>
        document.documentElement.setAttribute('data-theme', localStorage.getItem('lin_theme') || 'light');
        document.documentElement.setAttribute('data-accent', localStorage.getItem('lin_accent') || 'blue');
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased min-h-screen flex flex-col">

    <nav class="sticky top-0 z-40 ios-glass px-4 md:px-6 py-0 w-full overflow-x-auto hide-scrollbar">
        <div class="w-full mx-auto flex justify-between items-center h-16 min-w-[320px]">
            <div class="flex items-center gap-2 sm:gap-3 flex-shrink-0">
                <div class="ios-btn-primary p-1.5 rounded-lg shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <span class="font-bold text-lg sm:text-xl tracking-tight ios-text">LIN <span class="ios-text-primary">Quant</span></span>
            </div>
            <div class="flex h-full gap-2 sm:gap-6 flex-shrink-0 ml-4">
                <button onclick="switchView('home')" id="tab-home" class="tab-active h-full px-2 flex items-center transition-colors text-sm sm:text-base">雷達</button>
                <button onclick="switchView('analysis')" id="tab-analysis" class="tab-inactive h-full px-2 flex items-center transition-colors text-sm sm:text-base">深度分析</button>
                <button onclick="switchView('portfolio')" id="tab-portfolio" class="tab-inactive h-full px-2 flex items-center transition-colors text-sm sm:text-base">帳本</button>
            </div>
        </div>
    </nav>

    <div id="global-loader" class="fixed inset-0 ios-glass z-50 flex flex-col items-center justify-center hidden">
        <div class="w-10 h-10 border-4 ios-border border-t-[var(--primary-color)] rounded-full animate-spin"></div>
        <p class="mt-4 font-bold ios-text-primary text-sm" id="loader-text">載入中...</p>
    </div>

    <!-- 懸浮設定按鈕 -->
    <button onclick="toggleSettings()" class="fixed bottom-6 right-6 md:bottom-8 md:left-8 md:right-auto w-12 h-12 rounded-full ios-surface shadow-xl flex items-center justify-center z-40 hover:scale-105 transition-transform cursor-pointer border border-black/5 dark:border-white/10">
        <svg class="w-5 h-5 ios-text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
    </button>

    <!-- 主題設定 Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center hidden opacity-0 transition-opacity">
        <div class="ios-surface w-full sm:w-96 rounded-t-3xl sm:rounded-3xl p-8 transform translate-y-full sm:translate-y-0 transition-transform duration-300 shadow-2xl">
            <h3 class="text-xl font-bold ios-text mb-6">外觀設定</h3>
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold ios-text-muted mb-3 uppercase tracking-wider">深色模式</label>
                    <div class="flex gap-2 p-1 bg-black/5 dark:bg-white/5 rounded-lg border ios-border">
                        <button onclick="setTheme('light')" id="btn-theme-light" class="flex-1 py-1.5 text-sm font-bold rounded-md transition-colors">淺色</button>
                        <button onclick="setTheme('dark')" id="btn-theme-dark" class="flex-1 py-1.5 text-sm font-bold rounded-md transition-colors">深色</button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold ios-text-muted mb-3 uppercase tracking-wider">強調色系</label>
                    <div class="flex gap-4 justify-between sm:justify-start">
                        <button onclick="setAccent('blue')" class="w-10 h-10 rounded-full bg-[#007aff] ring-2 ring-offset-2 ring-offset-transparent ring-transparent focus:ring-[#007aff] transition-all"></button>
                        <button onclick="setAccent('orange')" class="w-10 h-10 rounded-full bg-[#ff9500] ring-2 ring-offset-2 ring-offset-transparent ring-transparent focus:ring-[#ff9500] transition-all"></button>
                        <button onclick="setAccent('black')" class="w-10 h-10 rounded-full bg-[#1d1d1f] dark:bg-white border border-gray-300 ring-2 ring-offset-2 ring-offset-transparent ring-transparent focus:ring-gray-400 transition-all"></button>
                        <button onclick="setAccent('gray')" class="w-10 h-10 rounded-full bg-[#8e8e93] ring-2 ring-offset-2 ring-offset-transparent ring-transparent focus:ring-[#8e8e93] transition-all"></button>
                    </div>
                </div>
            </div>
            <button onclick="toggleSettings()" class="w-full mt-8 py-3 rounded-xl ios-btn-primary font-bold text-sm">完成</button>
        </div>
    </div>

    <!-- 首頁雷達 -->
    <main id="view-home" class="w-full px-4 md:px-6 py-8 flex-1">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 gap-4">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold ios-text tracking-tight">智能雷達</h1>
                <p class="ios-text-muted text-xs sm:text-sm mt-1">系統已自動掃描監控清單，提供客觀決策參考。</p>
            </div>
            <button onclick="scanWatchlist()" class="ios-btn-primary px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 w-full sm:w-auto justify-center">同步清單</button>
        </div>
        
        <h2 class="text-xs sm:text-sm font-bold ios-text-muted mb-4 uppercase tracking-wider flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-[var(--buy-color)] animate-pulse"></span> 系統推薦標的
        </h2>
        <div id="recommendation-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 sm:gap-6 mb-10"></div>
        
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xs sm:text-sm font-bold ios-text-muted uppercase tracking-wider">監控清單</h2>
            <button onclick="openModal('add-watch-modal')" class="ios-text-primary font-bold text-sm">新增</button>
        </div>
        
        <div class="ios-surface rounded-2xl shadow-sm overflow-x-auto w-full">
            <table class="w-full text-left text-sm min-w-[500px]">
                <thead class="bg-black/5 dark:bg-white/5 ios-text-muted uppercase text-xs">
                    <tr><th class="px-4 md:px-6 py-4 font-medium">標的</th><th class="px-4 md:px-6 py-4 font-medium">觀望時長</th><th class="px-4 md:px-6 py-4 font-medium text-right">收盤價</th><th class="px-4 md:px-6 py-4 font-medium text-center">判定狀態</th><th class="px-4 md:px-6 py-4 font-medium text-center">操作</th></tr>
                </thead>
                <tbody id="watchlist-table" class="divide-y ios-border"></tbody>
            </table>
        </div>
    </main>

    <!-- 深度分析 -->
    <main id="view-analysis" class="w-full px-4 md:px-6 py-8 flex-1 hidden">
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-6 gap-4">
            <div class="relative w-full lg:w-[400px]">
                <input type="text" id="main-symbol-input" placeholder="輸入代碼或名稱" autocomplete="off" class="ios-surface ios-text rounded-xl pl-4 pr-12 py-3 lg:py-2.5 focus:outline-none focus:ring-1 focus:ring-[var(--primary-color)] w-full font-medium text-base uppercase transition-colors">
                <button id="main-search-btn" class="absolute right-2 top-2 lg:top-1.5 p-2 lg:p-1.5 ios-btn-primary rounded-lg shadow-sm"><svg class="w-5 h-5 lg:w-4 lg:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></button>
                <div id="autocomplete-list" class="autocomplete-dropdown ios-surface hidden"></div>
            </div>
            <div class="flex p-1 rounded-xl ios-surface w-full lg:w-auto overflow-x-auto hide-scrollbar">
                <button data-days="180" class="tf-btn flex-1 lg:flex-none px-4 lg:px-5 py-2 lg:py-1.5 rounded-lg text-sm font-medium ios-text-muted transition-all whitespace-nowrap">半年</button>
                <button data-days="365" class="tf-btn flex-1 lg:flex-none px-4 lg:px-5 py-2 lg:py-1.5 rounded-lg text-sm font-bold ios-bg-primary-soft transition-all whitespace-nowrap">1 年</button>
                <button data-days="1277" class="tf-btn flex-1 lg:flex-none px-4 lg:px-5 py-2 lg:py-1.5 rounded-lg text-sm font-medium ios-text-muted transition-all whitespace-nowrap">3.5 年</button>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-6 mb-6">
            <div class="xl:col-span-1 flex flex-col gap-4 sm:gap-6">
                <!-- 報價卡 -->
                <div class="ios-surface rounded-2xl shadow-sm p-6">
                    <div class="ios-text-muted text-[10px] font-bold uppercase tracking-widest mb-1" id="ana-date">--/--/--</div>
                    <h1 class="text-2xl sm:text-3xl font-bold ios-text tracking-tight" id="ana-name">無資料</h1>
                    <div class="text-xs sm:text-sm font-medium ios-text-muted mono mb-4 sm:mb-6" id="ana-symbol">----</div>
                    <div class="text-4xl sm:text-5xl font-light ios-text tracking-tighter mono" id="ana-price">--.--</div>
                    <div class="text-base sm:text-lg font-medium mono mt-1 ios-text-muted" id="ana-change">---</div>
                </div>
                
                <!-- 決策卡 -->
                <div class="ios-surface rounded-2xl shadow-sm p-6">
                    <h3 class="ios-text-muted text-[10px] font-bold uppercase tracking-widest mb-4 flex items-center justify-between">
                        系統演算判定 <span id="ana-duration" class="bg-black/5 dark:bg-white/10 px-2 py-0.5 rounded text-[10px] ios-text">-- 天</span>
                    </h3>
                    <div id="ana-action" class="text-xl sm:text-2xl font-bold tracking-tight mb-1 ios-text">等待運算</div>
                    <div id="ana-zone" class="text-xs font-medium ios-text-muted">---</div>
                    
                    <div class="grid grid-cols-2 gap-3 mt-6 pt-5 border-t ios-border">
                        <div class="bg-black/5 dark:bg-white/5 rounded-lg p-2.5">
                            <div class="text-[9px] ios-text-muted uppercase tracking-widest mb-1">雙週壓力</div>
                            <div class="text-sm sm:text-base font-medium mono ios-text-sell" id="ana-res">--</div>
                        </div>
                        <div class="bg-black/5 dark:bg-white/5 rounded-lg p-2.5">
                            <div class="text-[9px] ios-text-muted uppercase tracking-widest mb-1">雙週支撐</div>
                            <div class="text-sm sm:text-base font-medium mono ios-text-buy" id="ana-sup">--</div>
                        </div>
                    </div>
                </div>

                <!-- 10K 組合 -->
                <div class="ios-surface rounded-2xl shadow-sm p-6 flex-1 flex flex-col">
                    <h3 class="ios-text-muted text-[10px] font-bold uppercase tracking-widest mb-4">近雙週 (10K) 型態</h3>
                    <div class="bg-black/5 dark:bg-white/5 rounded-xl p-3 flex flex-col items-center justify-center mb-4 relative overflow-hidden ios-border border">
                        <div id="kline-drawing-area" class="w-full flex justify-center py-2 h-24 sm:h-32"></div>
                    </div>
                    <div id="ana-kline-checks" class="space-y-2 mb-2 text-xs ios-text"></div>
                </div>
            </div>

            <!-- 右側圖表 -->
            <div class="xl:col-span-3 flex flex-col gap-6">
                <div class="ios-surface rounded-2xl shadow-sm p-4 sm:p-6 flex flex-col h-[500px] sm:h-[700px]">
                    <div class="flex justify-between items-center mb-4">
                        <div class="font-bold text-sm ios-text">經典樂活五線譜</div>
                        <div class="text-[9px] sm:text-[10px] ios-text-muted uppercase tracking-widest hidden sm:block">FinMind Data</div>
                    </div>
                    <div id="main-chart" class="chart-container flex-1"></div>
                </div>

                <div class="ios-bg-primary-soft rounded-2xl p-4 sm:p-6">
                    <h3 class="ios-text-primary text-sm font-bold mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                        經理人檢核表
                    </h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-3">
                        <label class="flex flex-col gap-2 p-3 ios-surface rounded-xl cursor-pointer shadow-sm transition-colors group">
                            <div class="flex items-center gap-2"><input type="checkbox" class="ios-checkbox"><span class="font-bold text-xs ios-text transition-colors">1. 基本面</span></div>
                            <ul class="text-[10px] ios-text-muted space-y-1 pl-1"><li>- 營收 YoY 連續 3 個月 > 0</li><li>- 毛利率未見衰退</li><li>- 近四季 ROE > 15%</li></ul>
                        </label>
                        <label class="flex flex-col gap-2 p-3 ios-surface rounded-xl cursor-pointer shadow-sm transition-colors group">
                            <div class="flex items-center gap-2"><input type="checkbox" class="ios-checkbox"><span class="font-bold text-xs ios-text transition-colors">2. 技術面</span></div>
                            <ul class="text-[10px] ios-text-muted space-y-1 pl-1"><li>- 位階處於中線或低估區</li><li>- 站上月線且斜率向上</li><li>- 底部爆量或突破壓力</li></ul>
                        </label>
                        <label class="flex flex-col gap-2 p-3 ios-surface rounded-xl cursor-pointer shadow-sm transition-colors group">
                            <div class="flex items-center gap-2"><input type="checkbox" class="ios-checkbox"><span class="font-bold text-xs ios-text transition-colors">3. 籌碼面</span></div>
                            <ul class="text-[10px] ios-text-muted space-y-1 pl-1"><li>- 近 5 日法人買多於賣</li><li>- 盤整區間融資遞減</li><li>- 大戶持股比例攀升</li></ul>
                        </label>
                        <label class="flex flex-col gap-2 p-3 ios-surface rounded-xl cursor-pointer shadow-sm transition-colors group">
                            <div class="flex items-center gap-2"><input type="checkbox" class="ios-checkbox"><span class="font-bold text-xs ios-text transition-colors">4. 大氣候</span></div>
                            <ul class="text-[10px] ios-text-muted space-y-1 pl-1"><li>- 處於降息或利率見頂</li><li>- 產業存貨周轉下降</li><li>- 展望指引為正向</li></ul>
                        </label>
                        <label class="flex flex-col gap-2 p-3 ios-surface rounded-xl cursor-pointer shadow-sm transition-colors group">
                            <div class="flex items-center gap-2"><input type="checkbox" class="ios-checkbox"><span class="font-bold text-xs ios-text transition-colors">5. 控風險</span></div>
                            <ul class="text-[10px] ios-text-muted space-y-1 pl-1"><li>- 虧損鎖定總資產 2%</li><li>- 跌破關鍵支撐停損</li><li>- 盤整逾 20 日撤出</li></ul>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 視圖 3：資產帳本 -->
    <main id="view-portfolio" class="w-full px-4 md:px-6 py-8 flex-1 hidden">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 gap-4">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold ios-text tracking-tight">未實現損益分析</h1>
                <p class="ios-text-muted text-xs sm:text-sm mt-1">系統將擷取最新市價，計算持倉現況。</p>
            </div>
            <button onclick="openModal('add-trade-modal')" class="ios-btn-primary px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 w-full sm:w-auto justify-center">新增紀錄</button>
        </div>
        
        <div class="ios-surface rounded-2xl shadow-sm overflow-x-auto w-full">
            <table class="w-full text-left text-sm min-w-[700px]">
                <thead class="bg-black/5 dark:bg-white/5 ios-text-muted uppercase text-xs">
                    <tr><th class="px-6 py-4 font-medium">日期</th><th class="px-6 py-4 font-medium">標的</th><th class="px-6 py-4 font-medium text-right">成本價</th><th class="px-6 py-4 font-medium text-right">股數</th><th class="px-6 py-4 font-medium text-right">最新市價</th><th class="px-6 py-4 font-medium text-right">報酬率 (ROI)</th><th class="px-6 py-4 font-medium">筆記</th><th class="px-6 py-4 font-medium text-center">操作</th></tr>
                </thead>
                <tbody id="portfolio-table" class="divide-y ios-border"></tbody>
            </table>
            <div id="portfolio-empty" class="hidden p-12 text-center ios-text-muted font-medium text-sm border-t ios-border">無交易紀錄。</div>
        </div>
    </main>

    <!-- Modal：自選股 -->
    <div id="add-watch-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity p-4">
        <div class="ios-surface rounded-3xl p-6 w-full max-w-[320px] shadow-2xl transform scale-95 transition-transform">
            <h3 class="text-lg font-bold ios-text mb-4">新增監控</h3>
            <div class="space-y-4">
                <div><input type="text" id="watch-symbol" placeholder="代碼" class="w-full ios-surface ios-text border rounded-xl p-3 text-sm uppercase outline-none focus:border-[var(--primary-color)]"></div>
                <div><select id="watch-tf" class="w-full ios-surface ios-text border rounded-xl p-3 text-sm outline-none"><option value="180">半年 (短線)</option><option value="365" selected>1 年 (中線)</option><option value="1277">3.5 年 (長線)</option></select></div>
            </div>
            <div class="mt-8 flex justify-end gap-3"><button onclick="closeModal('add-watch-modal')" class="px-4 py-2 text-sm font-medium ios-text-muted">取消</button><button onclick="addWatchlist()" class="px-4 py-2 text-sm font-bold ios-btn-primary rounded-xl">儲存</button></div>
        </div>
    </div>

    <!-- Modal：新增部位 -->
    <div id="add-trade-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity p-4">
        <div class="ios-surface rounded-3xl p-6 w-full max-w-[480px] shadow-2xl transform scale-95 transition-transform">
            <h3 class="text-lg font-bold ios-text mb-4">記錄建倉</h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2 md:col-span-1"><input type="text" id="trade-symbol" placeholder="代碼或名稱" class="w-full ios-surface ios-text border rounded-xl p-3 text-sm uppercase outline-none focus:border-[var(--primary-color)]"></div>
                <div class="col-span-2 md:col-span-1"><input type="date" id="trade-date" class="w-full ios-surface ios-text border rounded-xl p-3 text-sm outline-none"></div>
                <div><input type="number" step="0.01" id="trade-price" placeholder="買進均價" class="w-full ios-surface ios-text border rounded-xl p-3 text-sm mono outline-none focus:border-[var(--primary-color)]"></div>
                <div><input type="number" id="trade-shares" placeholder="股數" class="w-full ios-surface ios-text border rounded-xl p-3 text-sm mono outline-none focus:border-[var(--primary-color)]"></div>
                <div class="col-span-2"><input type="text" id="trade-note" placeholder="策略筆記" class="w-full ios-surface ios-text border rounded-xl p-3 text-sm outline-none focus:border-[var(--primary-color)]"></div>
            </div>
            <div class="mt-8 flex justify-end gap-3"><button onclick="closeModal('add-trade-modal')" class="px-4 py-2 text-sm font-medium ios-text-muted">取消</button><button onclick="saveTrade()" class="px-5 py-2 text-sm font-bold ios-btn-primary rounded-xl">入帳</button></div>
        </div>
    </div>

    <footer class="mt-auto py-5 text-center text-[10px] ios-text-muted opacity-40 font-medium tracking-[0.2em] uppercase">
        DESIGN BY LINCY | 別人恐懼我買進
    </footer>

    <script src="app.js"></script>
</body>
</html>
